<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Notepad Pro - Tools</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background: #f0f2f5; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; font-size: 22px; text-align: center; margin-top: 0; }
        
        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        #saveStatus { font-size: 12px; color: #27ae60; font-weight: bold; height: 15px; }

        textarea { 
            width: 100%; height: 280px; border: 2px solid #e0e0e0; border-radius: 10px; 
            padding: 15px; font-size: 16px; box-sizing: border-box; outline: none; 
            transition: all 0.3s ease; resize: none; line-height: 1.5;
        }
        textarea:focus { border-color: #1a73e8; box-shadow: 0 0 8px rgba(26,115,232,0.1); }

        .dashboard { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; 
            margin-top: 20px; background: #f8f9fa; padding: 15px; border-radius: 10px; 
        }
        .stat-item { text-align: center; }
        .stat-label { display: block; font-size: 11px; color: #666; text-transform: uppercase; }
        .stat-value { font-size: 18px; font-weight: bold; color: #1a73e8; }

        .actions { margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { 
            padding: 12px; border: none; border-radius: 8px; 
            font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-copy { background: #1a73e8; color: white; }
        .btn-download { background: #34a853; color: white; }
        .btn-clear { background: #ea4335; color: white; grid-column: span 2; }
        button:active { transform: scale(0.98); opacity: 0.9; }

        .ad-banner { 
            margin-top: 25px; height: 70px; background: #fff8e1; 
            border: 1px dashed #ffc107; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; color: #b8860b; text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>SEO Notepad Pro</h2>
    
    <div class="status-bar">
        <div id="saveStatus"></div>
    </div>
    
    <textarea id="editor" placeholder="Start typing your SEO content..."></textarea>
    
    <div class="dashboard">
        <div class="stat-item">
            <span class="stat-label">Words</span>
            <span class="stat-value" id="wordCount">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Chars</span>
            <span class="stat-value" id="charCount">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Reading</span>
            <span class="stat-value" id="readTime">0</span><small>m</small>
        </div>
    </div>

    <div class="actions">
        <button class="btn-copy" onclick="copyContent()">Copy Text</button>
        <button class="btn-download" onclick="downloadNote()">Download .txt</button>
        <button class="btn-clear" onclick="clearContent()">Clear All</button>
    </div>

    <div class="ad-banner">
        Targeted Ads Placement<br>(Revenue Generation Area)
    </div>
</div>

<script>
    const editor = document.getElementById('editor');
    const wordCount = document.getElementById('wordCount');
    const charCount = document.getElementById('charCount');
    const readTime = document.getElementById('readTime');
    const saveStatus = document.getElementById('saveStatus');

    // 1. Load saved data on startup
    window.onload = () => {
        const savedText = localStorage.getItem('seo_pro_data');
        if (savedText) {
            editor.value = savedText;
            updateStats();
        }
    };

    // 2. Statistics update function
    function updateStats() {
        const text = editor.value.trim();
        const words = text ? text.split(/\s+/).length : 0;
        wordCount.innerText = words;
        charCount.innerText = text.length;
        readTime.innerText = Math.ceil(words / 200);
    }

    // 3. Auto-save functionality
    editor.addEventListener('input', () => {
        updateStats();
        localStorage.setItem('seo_pro_data', editor.value);
        
        saveStatus.innerText = "Saving...";
        setTimeout(() => { saveStatus.innerText = "● Saved to cloud"; }, 800);
    });

    // 4. Copy to Clipboard
    function copyContent() {
        if (!editor.value) return;
        editor.select();
        document.execCommand("copy");
        alert("Text copied!");
    }

    // 5. Download as Text File
    function downloadNote() {
        const text = editor.value;
        if (!text) return alert("Nothing to download");
        
        const blob = new Blob([text], { type: "text/plain" });
        const anchor = document.createElement("a");
        anchor.download = "my-seo-note.txt";
        anchor.href = window.URL.createObjectURL(blob);
        anchor.target = "_blank";
        anchor.style.display = "none"; 
        document.body.appendChild(anchor);
        anchor.click();
        document.body.removeChild(anchor);
    }

    // 6. Clear all data
    function clearContent() {
        if (confirm("Delete all content permanently?")) {
            editor.value = "";
            localStorage.removeItem('seo_pro_data');
            updateStats();
            saveStatus.innerText = "";
        }
    }
</script>

</body>
</html>
